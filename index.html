<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>행사 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#f5f5f7;display:flex;min-height:100vh}
.sidebar{width:200px;min-width:200px;background:#1d1d1f;color:#fff;padding:24px 0;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:40;transition:transform .25s}
.sidebar-logo{font-size:15px;font-weight:700;color:#fff;padding:0 20px;margin-bottom:28px;letter-spacing:-.3px;opacity:.6}
.sidebar-menu{list-style:none}
.sidebar-menu li{padding:10px 20px;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .15s;border-left:3px solid transparent;color:rgba(255,255,255,.55)}
.sidebar-menu li:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}
.sidebar-menu li.active{background:rgba(255,255,255,.08);color:#fff;border-left-color:#fff}
.sidebar-menu li .mi{font-size:16px;width:20px;text-align:center}
.mobile-menu-btn{display:none;position:fixed;top:14px;left:14px;z-index:50;width:36px;height:36px;border-radius:8px;border:1px solid #ddd;background:#fff;font-size:18px;cursor:pointer;align-items:center;justify-content:center}
.main-content{margin-left:200px;flex:1;padding:24px;display:flex;justify-content:center}
.page{width:100%;max-width:980px;display:none}.page.active{display:block}
.page-header{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:16px;user-select:none}
.nav-btn{width:40px;height:40px;border-radius:50%;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:18px;color:#333;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.nav-btn:hover{background:#f0f0f0;border-color:#bbb}.nav-btn:active{transform:scale(.95)}
.htitle{text-align:center}
.htitle h1{font-size:26px;font-weight:700;color:#1d1d1f;letter-spacing:-.5px}
.htitle p{font-size:12px;color:#86868b;margin-top:2px}
.toolbar{display:flex;gap:8px;justify-content:flex-end;margin-bottom:12px;flex-wrap:wrap;position:sticky;top:0;z-index:30;background:#f5f5f7;padding:12px 0}
.tool-btn{padding:7px 14px;border-radius:8px;border:1px solid #ddd;background:#fff;font-size:12px;font-family:'Noto Sans KR',sans-serif;font-weight:500;color:#444;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.tool-btn:hover{background:#f0f0f0;border-color:#bbb}
.tool-btn.primary{background:#1d1d1f;color:#fff;border-color:#1d1d1f}.tool-btn.primary:hover{background:#333}
.legend{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;padding:14px 16px;background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.legend.compact{flex-direction:row;flex-wrap:wrap;gap:4px 0;padding:12px 16px}
.legend-row{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:500;color:#444;padding:4px 0;border-radius:8px}
.legend-row.dragging{opacity:.4}.legend-row.drag-over{border-top:2px solid #1d1d1f;padding-top:2px}
.drag-handle{cursor:grab;font-size:14px;color:#bbb;flex-shrink:0;padding:0 2px;user-select:none;line-height:1}
.drag-handle:hover{color:#666}
.legend-dot{width:16px;height:16px;border-radius:5px;flex-shrink:0;position:relative;cursor:default}
.legend-dot.editable{cursor:pointer}.legend-dot.editable:hover{transform:scale(1.15);transition:transform .1s}
.color-picker{position:absolute;top:22px;left:-4px;z-index:50;background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:8px;display:flex;gap:6px;box-shadow:0 4px 16px rgba(0,0,0,.12);flex-wrap:wrap;width:148px}
.color-opt{width:22px;height:22px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:all .1s}
.color-opt:hover{transform:scale(1.2)}.color-opt.active{border-color:#333}
.legend-input{flex:1;border:1px solid transparent;border-radius:6px;padding:4px 8px;font-size:12px;font-family:'Noto Sans KR',sans-serif;font-weight:500;color:#333;background:transparent;transition:all .15s;min-width:0}
.legend-input:hover{background:#f8f8f8}.legend-input:focus{outline:none;border-color:#aaa;background:#fafafa}
.date-input{width:90px;text-align:center;border:1px solid #ddd;border-radius:6px;padding:4px 4px;font-size:11px;font-family:'Noto Sans KR',sans-serif;font-weight:500;color:#555;background:#fafafa}
.date-input:focus{outline:none;border-color:#888;background:#fff}
.period-sep{font-size:11px;color:#aaa;flex-shrink:0}
.del-btn{width:24px;height:24px;border-radius:6px;border:1px solid #f0c0c0;background:#fff;color:#e53935;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;line-height:1}
.del-btn:hover{background:#fff0f0;border-color:#e53935}
.legend-row-compact{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:500;color:#444;margin-right:18px;margin-bottom:2px}
.legend-name{cursor:pointer;border-radius:4px;padding:1px 4px;transition:background .15s}.legend-name:hover{background:#f0f0f0}
.legend-empty{text-align:center;color:#aaa;font-size:12px;padding:4px 0}

/* Week expand buttons */
.week-toggle{display:flex;justify-content:flex-start;gap:8px;margin-bottom:8px}
.wk-btn{padding:4px 16px;border-radius:6px;border:1px solid #ddd;background:#fff;font-size:11px;color:#888;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s}
.wk-btn:hover{background:#f0f0f0;border-color:#bbb;color:#555}
.wk-btn.active{background:#eee;color:#333;border-color:#bbb}

.calendar{background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.07);overflow:hidden}
.weekdays{display:grid;grid-template-columns:repeat(7,1fr);background:#fafafa;border-bottom:1px solid #e5e5e5}
.weekday{text-align:center;font-size:12px;font-weight:600;padding:12px 0;color:#555;letter-spacing:.5px}
.weekday.sun{color:#e53935}.weekday.sat{color:#1e88e5}
.days{display:grid;grid-template-columns:repeat(7,1fr);overflow:visible}
.day-cell{min-height:110px;border-right:1px solid #f0f0f0;border-bottom:1px solid #f0f0f0;padding:5px 6px 4px;position:relative;display:flex;flex-direction:column;overflow:visible}
.day-cell:nth-child(7n){border-right:none}
.days .day-cell:nth-last-child(-n+7){border-bottom:none}
.day-num{font-size:13.5px;font-weight:600;margin-bottom:3px;padding:1px 3px;display:inline-block;line-height:1.2;position:relative;z-index:2}
.day-cell.other-month .day-num{color:#ccc;font-weight:400}
.day-cell.sun .day-num{color:#e53935}.day-cell.sat .day-num{color:#1e88e5}
.day-cell.other-month.sun .day-num{color:#f5b7b7}.day-cell.other-month.sat .day-num{color:#a7cff2}
.events-area{display:flex;flex-direction:column;gap:2px;margin-top:2px;margin-left:-6px;margin-right:-6px;flex:1;overflow:visible}
.event-bar{font-size:10px;font-weight:600;padding:2px 6px;white-space:nowrap;overflow:visible;line-height:1.4;height:17px;min-height:17px;position:relative}
.event-bar.has-text{z-index:5}
.event-bar.start{border-radius:4px 0 0 4px}.event-bar.middle{border-radius:0}.event-bar.end{border-radius:0 4px 4px 0}.event-bar.single{border-radius:4px}
.event-bar.week-end{border-radius:0 4px 4px 0}.event-bar.week-start{border-radius:4px 0 0 4px}
.event-bar.week-start.end{border-radius:4px}.event-bar.start.week-end{border-radius:4px}
.ev-purple{background:#e3d5f3;color:#5b3a8a}.ev-blue{background:#cde7fa;color:#1a5f8a}
.ev-pink{background:#fad6e0;color:#9a2850}.ev-green{background:#c8ede2;color:#1a7a5a}
.ev-red{background:#f5caca;color:#8b1a1a}.ev-orange{background:#fce0c8;color:#8a4a1a}
.ev-mint{background:#c0f0ed;color:#1a7a7a}.ev-gray{background:#e0dfd9;color:#5a5a56}
.event-bar.spacer{background:transparent!important;height:17px;min-height:17px}

/* Perf */
.perf-grid{display:flex;flex-wrap:wrap;gap:14px;align-items:start}
.perf-card{border-radius:10px;border:1px solid #e8e8e8;background:#fff;width:230px;flex-shrink:0;transition:opacity .2s}
.perf-card.dragging{opacity:.4}.perf-card.drag-over{box-shadow:0 0 0 2px #1d1d1f}
.perf-card-header{padding:12px 14px;position:relative;border-radius:10px 10px 0 0}
.perf-card-title{font-size:13px;font-weight:700}.perf-card-meta{font-size:10px;margin-top:3px;opacity:.7}
.perf-tag{display:inline-block;font-size:9px;padding:1px 7px;border-radius:20px;font-weight:600;margin-left:4px;vertical-align:middle}
.perf-info-row{display:flex;border-top:1px solid rgba(0,0,0,.06);border-bottom:1px solid rgba(0,0,0,.06)}
.perf-info-cell{flex:1;padding:8px 10px;border-right:1px solid rgba(0,0,0,.06)}.perf-info-cell:last-child{border-right:none}
.perf-info-label{font-size:9px;color:#aaa;margin-bottom:2px}.perf-info-value{font-size:12px;font-weight:700;color:#333}
.perf-th{display:flex;padding:6px 10px;background:#fafafa;border-bottom:1px solid #f0f0f0;font-size:9px;color:#bbb}
.perf-th span{font-weight:500}.perf-th .n{flex:1}.perf-th .r{text-align:right;width:44px}.perf-th .a{text-align:right;width:70px}
.perf-row{display:flex;padding:6px 10px;font-size:11px;color:#444;border-bottom:1px solid #f5f5f5}
.perf-row:last-child{border-bottom:none}
.perf-row .n{flex:1}.perf-row .r{text-align:right;width:44px;white-space:nowrap;color:#888}
.perf-row .a{text-align:right;width:70px;font-weight:600;color:#333;white-space:nowrap}
.sort-btn{font-size:11px;color:#bbb;background:none;border:none;padding:0 0 0 4px;cursor:pointer;line-height:1;transition:color .15s}
.sort-btn:hover{color:#888}.sort-btn.active{color:#555}
.perf-edit-row{display:flex;gap:6px;align-items:center;padding:4px 10px;border-bottom:1px solid #f5f5f5}
.perf-edit-row input{border:1px solid #ddd;border-radius:5px;padding:4px 6px;font-size:11px;font-family:'Noto Sans KR',sans-serif}
.perf-edit-row .pn{flex:1;min-width:0}.perf-edit-row .pr{width:50px;text-align:right}.perf-edit-row .pa{width:80px;text-align:right}
.perf-add-btn{width:100%;padding:6px;font-size:11px;color:#888;background:#fafafa;border:none;border-top:1px solid #f0f0f0;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.perf-add-btn:hover{background:#f0f0f0;color:#555}
.tag-input{border:1px solid #ddd;border-radius:5px;padding:2px 6px;font-size:10px;width:60px;font-family:'Noto Sans KR',sans-serif}.tag-input:focus{outline:none;border-color:#888}
.perf-empty{text-align:center;color:#bbb;font-size:12px;padding:30px 10px}
.hidden-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.hidden-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500;color:#888;background:#fff;border:1px solid #e0e0e0;cursor:pointer;transition:all .15s}
.hidden-chip:hover{border-color:#aaa;color:#555}.hidden-chip .chip-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

.pc-purple .perf-card-header{background:#EDE7F6}.pc-purple .perf-card-title{color:#6A3FA6}.pc-purple .perf-tag{background:#D1C4E9;color:#6A3FA6}
.pc-blue .perf-card-header{background:#E3F2FD}.pc-blue .perf-card-title{color:#1565C0}.pc-blue .perf-tag{background:#BBDEFB;color:#1565C0}
.pc-green .perf-card-header{background:#E0F5EE}.pc-green .perf-card-title{color:#0F6E56}.pc-green .perf-tag{background:#B2DFDB;color:#0F6E56}
.pc-pink .perf-card-header{background:#FCE4EC}.pc-pink .perf-card-title{color:#AD1457}.pc-pink .perf-tag{background:#F8BBD0;color:#AD1457}
.pc-red .perf-card-header{background:#FDEAEA}.pc-red .perf-card-title{color:#8b1a1a}.pc-red .perf-tag{background:#F5CACA;color:#8b1a1a}
.pc-orange .perf-card-header{background:#FFF3E0}.pc-orange .perf-card-title{color:#8a4a1a}.pc-orange .perf-tag{background:#FCE0C8;color:#8a4a1a}
.pc-mint .perf-card-header{background:#E0F7F5}.pc-mint .perf-card-title{color:#1a7a7a}.pc-mint .perf-tag{background:#C0F0ED;color:#1a7a7a}
.pc-gray .perf-card-header{background:#EEEEE8}.pc-gray .perf-card-title{color:#5a5a56}.pc-gray .perf-tag{background:#D3D1C7;color:#5a5a56}

#fileInput,#fileInput2{display:none}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:#1d1d1f;color:#fff;padding:10px 24px;border-radius:10px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;pointer-events:none;z-index:100}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:700px){
  .sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}
  .mobile-menu-btn{display:flex}.main-content{margin-left:0;padding:24px 16px;padding-top:60px}
  .day-cell{min-height:85px;padding:4px 4px 3px}.events-area{margin-left:-4px;margin-right:-4px}
  .day-num{font-size:12px}.event-bar{font-size:8.5px;padding:1px 4px;height:15px;min-height:15px}
  .htitle h1{font-size:22px}.toolbar{justify-content:center}
  .perf-grid{justify-content:center}.perf-card{width:100%}
}
</style>
</head>
<body>
<button class="mobile-menu-btn" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>
<nav class="sidebar">
  <div class="sidebar-logo">Dashboard</div>
  <ul class="sidebar-menu">
    <li class="active" onclick="switchPage('cal')"><span class="mi">📅</span>캘린더</li>
    <li onclick="switchPage('perf')"><span class="mi">📊</span>행사 성과</li>
  </ul>
</nav>
<div class="main-content">

<div class="page active" id="page-cal">
  <div class="toolbar">
    <button class="tool-btn" id="editToggleBtn" onclick="toggleEdit()">✏️ 편집</button>
    <button class="tool-btn" onclick="exportJSON()">📤 내보내기</button>
    <button class="tool-btn" onclick="document.getElementById('fileInput').click()">📥 불러오기</button>
    <input type="file" id="fileInput" accept=".json" onchange="importJSON(event)">
  </div>
  <div class="page-header">
    <button class="nav-btn" onclick="navMonth(-1,'cal')">◀</button>
    <div class="htitle"><h1 id="calTitle"></h1><p id="calSub"></p></div>
    <button class="nav-btn" onclick="navMonth(1,'cal')">▶</button>
  </div>
  <div class="legend" id="legend"></div>
  <div class="calendar">
    <div class="weekdays">
      <div class="weekday sun">일</div><div class="weekday">월</div><div class="weekday">화</div>
      <div class="weekday">수</div><div class="weekday">목</div><div class="weekday">금</div>
      <div class="weekday sat">토</div>
    </div>
    <div class="days" id="calendarDays"></div>
  </div>
  <div class="week-toggle" style="margin-top:8px">
    <button class="wk-btn" onclick="changePrevWeek(1)">▲ 전월 추가</button>
    <button class="wk-btn" onclick="changePrevWeek(-1)">▲ 전월 삭제</button>
    <button class="wk-btn" onclick="changeNextWeek(1)">▼ 익월 추가</button>
    <button class="wk-btn" onclick="changeNextWeek(-1)">▼ 익월 삭제</button>
  </div>
</div>

<div class="page" id="page-perf">
  <div class="toolbar">
    <button class="tool-btn" id="perfEditBtn" onclick="togglePerfEdit()">✏️ 편집</button>
    <button class="tool-btn" onclick="exportJSON()">📤 내보내기</button>
    <button class="tool-btn" onclick="document.getElementById('fileInput2').click()">📥 불러오기</button>
    <input type="file" id="fileInput2" accept=".json" onchange="importJSON(event)">
  </div>
  <div class="page-header">
    <button class="nav-btn" onclick="navMonth(-1,'perf')">◀</button>
    <div class="htitle"><h1 id="perfTitle"></h1><p id="perfSub"></p></div>
    <button class="nav-btn" onclick="navMonth(1,'perf')">▶</button>
  </div>
  <div class="hidden-bar" id="hiddenBar"></div>
  <div class="perf-grid" id="perfGrid"></div>
</div>

</div>
<div class="toast" id="toast"></div>

<script>
const MKO=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const MEN=['January','February','March','April','May','June','July','August','September','October','November','December'];
const COLORS=[
  {cls:'ev-mint',bg:'#c0f0ed',bd:'#80d8d4',label:'민트',pc:'pc-mint'},
  {cls:'ev-green',bg:'#c8ede2',bd:'#88d4bc',label:'초록',pc:'pc-green'},
  {cls:'ev-blue',bg:'#cde7fa',bd:'#96cbee',label:'파랑',pc:'pc-blue'},
  {cls:'ev-purple',bg:'#e3d5f3',bd:'#c4a8e0',label:'보라',pc:'pc-purple'},
  {cls:'ev-pink',bg:'#fad6e0',bd:'#f0a4bb',label:'핑크',pc:'pc-pink'},
  {cls:'ev-red',bg:'#f5caca',bd:'#e0a0a0',label:'빨강',pc:'pc-red'},
  {cls:'ev-orange',bg:'#fce0c8',bd:'#e8c0a0',label:'주황',pc:'pc-orange'},
  {cls:'ev-gray',bg:'#e0dfd9',bd:'#b4b2a9',label:'회색',pc:'pc-gray'},
];
const colorOf=cls=>COLORS.find(c=>c.cls===cls)||COLORS[0];

// ── Helpers ──
const fmt=n=>n.toLocaleString('ko-KR');
const pad2=n=>String(n).padStart(2,'0');
const mkkey=(y,m)=>`${y}-${pad2(m)}`;
const dimOf=(y,m)=>new Date(y,m,0).getDate();
const fdOf=(y,m)=>new Date(y,m-1,1).getDay();
const parseD=s=>{const p=s.split('-');return{y:+p[0],m:+p[1],d:+p[2]}};
const toDS=(y,m,d)=>`${y}-${pad2(m)}-${pad2(d)}`;
const dNum=s=>{const p=parseD(s);return p.y*10000+p.m*100+p.d};

// ── State ──
let calData={}, perfData={}, perfHidden={};
const _now=new Date();
let cY=_now.getFullYear(),cM=_now.getMonth()+1;
let editing=false,perfEditing=false,dragIdx=null,perfDragIdx=null,curPage='cal';
let extraPrevWeeks=0, extraNextWeeks=0;

function mkey(){return mkkey(cY,cM)}

// ── Migrate old data (numeric start/end → date strings) ──
function migrateMonth(k,evs){
  const[y,m]=k.split('-').map(Number);
  evs.forEach(ev=>{
    if(typeof ev.start==='number'){
      ev.sd=toDS(y,m,Math.min(ev.start,dimOf(y,m)));
      ev.ed=toDS(y,m,Math.min(ev.end,dimOf(y,m)));
      delete ev.start; delete ev.end;
    }
  });
}
function migrateAll(){
  Object.keys(calData).forEach(k=>{if(calData[k])migrateMonth(k,calData[k])});
}

// ── Init data ──
calData={
  "2026-03":[
    {name:'2월푸페 _0223-0301',sd:'2026-02-23',ed:'2026-03-01',cls:'ev-gray'},
    {name:'2월한입 _0223-0301',sd:'2026-02-23',ed:'2026-03-01',cls:'ev-gray'},
    {name:'3월슈적_플3+소3,푸5',sd:'2026-03-01',ed:'2026-03-31',cls:'ev-purple'},
    {name:'3월한입_(선물)플3+소3+토핑6,카4+플4',sd:'2026-03-06',ed:'2026-03-12',cls:'ev-blue'},
    {name:'3월푸페_10종',sd:'2026-03-16',ed:'2026-03-22',cls:'ev-green'},
    {name:'3월오끝_체험8종',sd:'2026-03-07',ed:'2026-03-08',cls:'ev-pink'},
  ],
  "2026-04":[
    {name:'4월슈적_플3+소3,푸5',sd:'2026-04-01',ed:'2026-04-30',cls:'ev-purple'},
    {name:'4월굿바이 _오3+플3 _0409-0412',sd:'2026-04-09',ed:'2026-04-12',cls:'ev-orange'},
    {name:'4월푸페 _5종 _0413-0419',sd:'2026-04-13',ed:'2026-04-19',cls:'ev-green'},
    {name:'4월복숭아런칭_미정 _0421-',sd:'2026-04-21',ed:'2026-05-04',cls:'ev-pink'},
  ],
};
perfData={
  "2026-03":{
    "3월슈적_플3+소3,푸5":{tag:"2종",items:[{name:"플3+소3",cnt:417,amt:7578850},{name:"푸5",cnt:18,amt:430080}]},

function changePrevWeek(d){extraPrevWeeks=Math.max(0,extraPrevWeeks+d);renderCalGrid()}

// ── Collect all events visible in a date range ──
function getVisibleEvents(){
  const allEvs=[];
  const months=[mkkey(cY,cM)];
  const pm=cM===1?12:cM-1,py=cM===1?cY-1:cY;
  const nm=cM===12?1:cM+1,ny=cM===12?cY+1:cY;
  months.push(mkkey(py,pm),mkkey(ny,nm));
  const seen=new Set();
  months.forEach(mk=>{
    (calData[mk]||[]).forEach(ev=>{
      const uid=ev.name+'|'+ev.sd+'|'+ev.ed;
      if(!seen.has(uid)){seen.add(uid);allEvs.push(ev)}
    });
  });
  return allEvs;
}

// ── Lane assignment for visible events ──
function assignVisibleLanes(evs){
  const sorted=[...evs].sort((a,b)=>dNum(a.sd)-dNum(b.sd)||dNum(a.ed)-dNum(b.ed));
  const lanes=[];
  sorted.forEach(ev=>{
    const sn=dNum(ev.sd),en=dNum(ev.ed);
    for(let l=0;;l++){
      if(!lanes[l])lanes[l]=[];
      if(!lanes[l].some(o=>!(en<dNum(o.sd)||sn>dNum(o.ed)))){
        lanes[l].push(ev);ev._lane=l;break;
      }
    }
  });
  return sorted;
}

function renderLegend(){
  const lg=document.getElementById('legend');lg.innerHTML='';
  const k=mkey(),evs=calData[k];
  if(!evs||!evs.length){
    if(!editing){lg.className='legend';lg.innerHTML='<div class="legend-empty">이 달에 등록된 행사가 없습니다</div>';return}
    lg.className='legend';
    const ab=document.createElement('button');ab.className='tool-btn';ab.style.cssText='width:100%;justify-content:center';ab.textContent='＋ 행사 추가';
    ab.onclick=()=>{if(!calData[k])calData[k]=[];calData[k].push({name:'새 행사',sd:toDS(cY,cM,1),ed:toDS(cY,cM,1),cls:COLORS[0].cls});renderLegend();renderCalGrid()};
    lg.appendChild(ab);return;
  }
  if(!editing){
    lg.className='legend compact';
    evs.forEach(ev=>{const s=document.createElement('span');s.className='legend-row-compact';const c=colorOf(ev.cls);
      s.innerHTML=`<span class="legend-dot" style="background:${c.bg};border:1px solid ${c.bd}"></span><span class="legend-name">${ev.name}</span>`;
      s.querySelector('.legend-name').onclick=()=>{navigator.clipboard.writeText(ev.name).then(()=>toast(`"${ev.name}" 복사됨`))};lg.appendChild(s)});return;
  }
  lg.className='legend';
  evs.forEach((ev,i)=>{
    const row=document.createElement('div');row.className='legend-row';row.draggable=true;
    row.ondragstart=e=>{dragIdx=i;row.classList.add('dragging');e.dataTransfer.effectAllowed='move'};
    row.ondragend=()=>{dragIdx=null;document.querySelectorAll('.legend-row').forEach(r=>r.classList.remove('dragging','drag-over'))};
    row.ondragover=e=>{e.preventDefault();row.classList.add('drag-over')};
    row.ondragleave=()=>row.classList.remove('drag-over');
    row.ondrop=e=>{e.preventDefault();row.classList.remove('drag-over');if(dragIdx===null||dragIdx===i)return;const[m]=calData[k].splice(dragIdx,1);calData[k].splice(i,0,m);renderLegend();renderCalGrid()};
    const c=colorOf(ev.cls);
    const h=document.createElement('span');h.className='drag-handle';h.textContent='⠿';
    const dot=document.createElement('div');dot.className='legend-dot editable';dot.style.cssText=`background:${c.bg};border:1px solid ${c.bd}`;
    dot.onclick=e=>{e.stopPropagation();closePickers();const pk=document.createElement('div');pk.className='color-picker';
      COLORS.forEach(co=>{const o=document.createElement('div');o.className='color-opt'+(ev.cls===co.cls?' active':'');o.style.background=co.bg;o.title=co.label;
        o.onclick=e2=>{e2.stopPropagation();calData[k][i].cls=co.cls;closePickers();renderLegend();renderCalGrid()};pk.appendChild(o)});dot.appendChild(pk)};
    const ni=document.createElement('input');ni.type='text';ni.className='legend-input';ni.value=ev.name;ni.oninput=e=>{calData[k][i].name=e.target.value;renderCalGrid()};
    const si=document.createElement('input');si.type='date';si.className='date-input';si.value=ev.sd;
    si.onchange=e=>{calData[k][i].sd=e.target.value;if(dNum(e.target.value)>dNum(calData[k][i].ed))calData[k][i].ed=e.target.value;renderLegend();renderCalGrid()};
    const sp=document.createElement('span');sp.className='period-sep';sp.textContent='~';
    const ei=document.createElement('input');ei.type='date';ei.className='date-input';ei.value=ev.ed;
    ei.onchange=e=>{if(dNum(e.target.value)<dNum(calData[k][i].sd))return;calData[k][i].ed=e.target.value;renderLegend();renderCalGrid()};
    const dl=document.createElement('button');dl.className='del-btn';dl.textContent='✕';dl.onclick=()=>{calData[k].splice(i,1);renderLegend();renderCalGrid()};
    row.append(h,dot,ni,si,sp,ei,dl);lg.appendChild(row);
  });
  const ab=document.createElement('button');ab.className='tool-btn';ab.style.cssText='width:100%;justify-content:center;margin-top:4px';ab.textContent='＋ 행사 추가';
  ab.onclick=()=>{calData[k].push({name:'새 행사',sd:toDS(cY,cM,1),ed:toDS(cY,cM,1),cls:COLORS[calData[k].length%COLORS.length].cls});renderLegend();renderCalGrid()};
  lg.appendChild(ab);
}

function renderCalGrid(){
  const con=document.getElementById('calendarDays');con.innerHTML='';
  const f=fdOf(cY,cM),d=dimOf(cY,cM);
  const pm=cM===1?12:cM-1,py=cM===1?cY-1:cY,dpm=dimOf(py,pm);
  const nm=cM===12?1:cM+1,ny=cM===12?cY+1:cY;

  // Build grid cells as {y,m,d}
  let baseBefore=f;
  let baseTotal=Math.ceil((baseBefore+d)/7)*7;
  let baseAfter=baseTotal-baseBefore-d;

  // Extra weeks
  const totalBefore=baseBefore+extraPrevWeeks*7;
  const totalAfter=baseAfter+extraNextWeeks*7;

  const grid=[];
  for(let i=totalBefore-1;i>=0;i--){
    let dd=dpm-i;let gy=py,gm=pm;
    if(dd<1){const pp=pm===1?12:pm-1;const ppy=pm===1?py-1:py;dd+=dimOf(ppy,pp);gy=ppy;gm=pp}
    grid.push({y:gy,m:gm,d:dd,cur:false});
  }
  for(let i=1;i<=d;i++) grid.push({y:cY,m:cM,d:i,cur:true});
  for(let i=1;i<=totalAfter;i++){
    let dd=i;let gy=ny,gm=nm;
    if(dd>dimOf(ny,nm)){dd-=dimOf(ny,nm);const nn=nm===12?1:nm+1;const nny=nm===12?ny+1:ny;gy=nny;gm=nn}
    grid.push({y:gy,m:gm,d:dd,cur:false});
  }

  // Get all events and assign lanes
  const allEvs=getVisibleEvents();
  const sorted=assignVisibleLanes(allEvs);
  const lc=sorted.length?Math.max(...sorted.map(e=>e._lane))+1:0;

  grid.forEach((cell,idx)=>{
    const col=idx%7,sun=col===0,sat=col===6;
    const div=document.createElement('div');div.className='day-cell';
    if(!cell.cur)div.classList.add('other-month');
    if(sun)div.classList.add('sun');if(sat)div.classList.add('sat');
    const num=document.createElement('div');num.className='day-num';num.textContent=cell.d;
    div.appendChild(num);

    if(lc>0){
      const cellDate=dNum(toDS(cell.y,cell.m,cell.d));
      const ea=document.createElement('div');ea.className='events-area';
      for(let l=0;l<lc;l++){
        const ev=sorted.find(e=>e._lane===l&&cellDate>=dNum(e.sd)&&cellDate<=dNum(e.ed));
        if(ev){
          const bar=document.createElement('div');bar.className='event-bar '+ev.cls;
          const isS=cellDate===dNum(ev.sd),isE=cellDate===dNum(ev.ed);
          if(isS&&isE)bar.classList.add('single');
          else if(isS&&sat)bar.classList.add('start','week-end');
          else if(isE&&sun)bar.classList.add('week-start','end');
          else if(isS)bar.classList.add('start');
          else if(isE)bar.classList.add('end');
          else if(sun)bar.classList.add('week-start');
          else if(sat)bar.classList.add('week-end');
          else bar.classList.add('middle');
          if(isS||sun){bar.textContent=ev.name;bar.classList.add('has-text')}
          ea.appendChild(bar);
        }else{
          const s=document.createElement('div');s.className='event-bar spacer';ea.appendChild(s);
        }
      }
      div.appendChild(ea);
    }
    con.appendChild(div);
  });
}

function togglePerfEdit(){perfEditing=!perfEditing;document.getElementById('perfEditBtn').innerHTML=perfEditing?'💾 저장':'✏️ 편집';document.getElementById('perfEditBtn').classList.toggle('primary',perfEditing);renderPerfCards()}
function renderPerf(){document.getElementById('perfTitle').textContent=`${cY}년 ${MKO[cM-1]}`;document.getElementById('perfSub').textContent='행사 기간 상품 판매성과';renderPerfCards()}

function renderPerfCards(){
  const grid=document.getElementById('perfGrid');grid.innerHTML='';
  const hbar=document.getElementById('hiddenBar');hbar.innerHTML='';
  const k=mkey(),evs=calData[k]||[];
  if(!perfData[k])perfData[k]={};
  if(!perfHidden[k])perfHidden[k]={};

  if(!evs.length){const emp=document.createElement('div');emp.className='perf-empty';emp.style.width='100%';emp.innerHTML='이 달에 등록된 행사가 없습니다.<br>캘린더에서 행사를 먼저 추가해주세요.';grid.appendChild(emp);return}

  let order=perfData[k]._order||null;
  let orderedEvs;
  if(order){orderedEvs=order.map(n=>evs.find(e=>e.name===n)).filter(Boolean);evs.forEach(e=>{if(!order.includes(e.name))orderedEvs.push(e)})}
  else{orderedEvs=[...evs]}

  const hiddenNames=Object.keys(perfHidden[k]).filter(n=>perfHidden[k][n]);
  hiddenNames.forEach(n=>{
    const ev=evs.find(e=>e.name===n);if(!ev)return;
    const c=colorOf(ev.cls);
    const chip=document.createElement('span');chip.className='hidden-chip';chip.title='클릭하여 다시 표시';
    chip.innerHTML=`<span class="chip-dot" style="background:${c.bg};border:1px solid ${c.bd}"></span>${ev.name.split('_')[0]} 👁`;
    chip.onclick=()=>{perfHidden[k][n]=false;renderPerfCards()};
    hbar.appendChild(chip);
  });

  orderedEvs.forEach((ev,ci)=>{
    if(perfHidden[k][ev.name])return;
    const c=colorOf(ev.cls);
    const pKey=ev.name;
    if(!perfData[k][pKey])perfData[k][pKey]={tag:'',items:[]};
    const pd=perfData[k][pKey];
    const evName=ev.name;

    const card=document.createElement('div');card.className='perf-card '+(c.pc||'pc-purple');card.dataset.name=evName;

    // Drop target
    card.ondragover=e=>{e.preventDefault();card.classList.add('drag-over')};
    card.ondragleave=()=>card.classList.remove('drag-over');
    card.ondrop=e=>{e.preventDefault();card.classList.remove('drag-over');if(!perfDragIdx||perfDragIdx===evName)return;const names=orderedEvs.map(x=>x.name);const fi=names.indexOf(perfDragIdx),ti=names.indexOf(evName);if(fi<0||ti<0)return;names.splice(fi,1);names.splice(ti,0,perfDragIdx);perfData[k]._order=names;renderPerfCards()};

    // Header
    const hdr=document.createElement('div');hdr.className='perf-card-header';hdr.style.cssText='display:flex;align-items:flex-start;gap:6px';
    const sdp=parseD(ev.sd),edp=parseD(ev.ed);
    const days=Math.round((new Date(edp.y,edp.m-1,edp.d)-new Date(sdp.y,sdp.m-1,sdp.d))/(864e5))+1;

    // Drag handle
    const handle=document.createElement('span');handle.draggable=true;
    handle.style.cssText='cursor:grab;font-size:14px;color:#bbb;user-select:none;padding:0 2px;line-height:1;flex-shrink:0;margin-top:1px';
    handle.textContent='⠿';
    handle.ondragstart=e=>{perfDragIdx=evName;card.classList.add('dragging');e.dataTransfer.effectAllowed='move'};
    handle.ondragend=()=>{perfDragIdx=null;document.querySelectorAll('.perf-card').forEach(c2=>c2.classList.remove('dragging','drag-over'))};

    // Hide button
    const hideBtn=document.createElement('button');hideBtn.type='button';
    hideBtn.style.cssText='cursor:pointer;font-size:12px;color:#bbb;flex-shrink:0;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:4px;border:1px solid rgba(0,0,0,.1);background:rgba(255,255,255,.5);padding:0';
    hideBtn.textContent='✕';
    hideBtn.addEventListener('click',function(){if(!perfHidden[k])perfHidden[k]={};perfHidden[k][evName]=true;renderPerfCards()});

    // Title area
    const titleArea=document.createElement('div');titleArea.style.cssText='flex:1;min-width:0';
    const dateStr=`${pad2(sdp.m)}/${pad2(sdp.d)} ~ ${pad2(edp.m)}/${pad2(edp.d)} · ${days}일`;

    if(perfEditing){
      const tr=document.createElement('div');tr.style.cssText='display:flex;align-items:center;gap:6px';
      const ts=document.createElement('span');ts.className='perf-card-title';ts.textContent=ev.name.split('_')[0];
      const ti=document.createElement('input');ti.className='tag-input';ti.value=pd.tag;ti.placeholder='종수';
      ti.oninput=e=>{perfData[k][pKey].tag=e.target.value};
      tr.append(ts,ti);
      const mt=document.createElement('div');mt.className='perf-card-meta';mt.textContent=dateStr;
      titleArea.append(tr,mt);
    }else{
      titleArea.innerHTML=`<div class="perf-card-title">${ev.name.split('_')[0]} ${pd.tag?`<span class="perf-tag">${pd.tag}</span>`:''}</div><div class="perf-card-meta">${dateStr}</div>`;
    }
    hdr.append(handle,titleArea,hideBtn);card.appendChild(hdr);

    // Summary
    const tc=pd.items.reduce((s,x)=>s+x.cnt,0),ta=pd.items.reduce((s,x)=>s+x.amt,0);
    const ir=document.createElement('div');ir.className='perf-info-row';
    ir.innerHTML=`<div class="perf-info-cell"><div class="perf-info-label">총 판매</div><div class="perf-info-value">${fmt(tc)}건</div></div><div class="perf-info-cell"><div class="perf-info-label">결제금액</div><div class="perf-info-value">${fmt(ta)}</div></div>`;
    card.appendChild(ir);

    if(perfEditing){
      pd.items.forEach((it,ii)=>{
        const r=document.createElement('div');r.className='perf-edit-row';
        const ni=document.createElement('input');ni.className='pn';ni.value=it.name;ni.placeholder='상품명';ni.oninput=e=>{perfData[k][pKey].items[ii].name=e.target.value};
        const ci2=document.createElement('input');ci2.className='pr';ci2.type='number';ci2.value=it.cnt;ci2.placeholder='건수';ci2.onchange=e=>{perfData[k][pKey].items[ii].cnt=parseInt(e.target.value)||0;renderPerfCards()};
        const ai=document.createElement('input');ai.className='pa';ai.type='number';ai.value=it.amt;ai.placeholder='금액';ai.onchange=e=>{perfData[k][pKey].items[ii].amt=parseInt(e.target.value)||0;renderPerfCards()};
        const db=document.createElement('button');db.className='del-btn';db.style.cssText='width:20px;height:20px;font-size:11px';db.textContent='✕';db.onclick=()=>{perfData[k][pKey].items.splice(ii,1);renderPerfCards()};
        r.append(ni,ci2,ai,db);card.appendChild(r);
      });
      const ab=document.createElement('button');ab.className='perf-add-btn';ab.textContent='＋ 상품 추가';
      ab.onclick=()=>{perfData[k][pKey].items.push({name:'',cnt:0,amt:0});renderPerfCards()};
      card.appendChild(ab);
    }else{
      if(pd.items.length){
        const th=document.createElement('div');th.className='perf-th';
        th.innerHTML='<span class="n">상품</span><span class="r">건수</span><span class="a">금액 <button class="sort-btn">↓</button></span>';
        th.querySelector('.sort-btn').onclick=function(){
          const asc=this.textContent==='↓';
          pd.items.sort((a,b)=>asc?b.amt-a.amt:a.amt-b.amt);
          this.textContent=asc?'↑':'↓';this.classList.toggle('active',asc);
          const pc=this.closest('.perf-card');pc.querySelectorAll('.perf-row').forEach(r=>r.remove());
          pd.items.forEach(it=>{const r=document.createElement('div');r.className='perf-row';r.innerHTML=`<span class="n">${it.name}</span><span class="r">${fmt(it.cnt)}</span><span class="a">${fmt(it.amt)}</span>`;pc.appendChild(r)});
        };
        card.appendChild(th);
        pd.items.forEach(it=>{const r=document.createElement('div');r.className='perf-row';r.innerHTML=`<span class="n">${it.name}</span><span class="r">${fmt(it.cnt)}</span><span class="a">${fmt(it.amt)}</span>`;card.appendChild(r)});
      }else{
        const emp=document.createElement('div');emp.className='perf-empty';emp.textContent='등록된 상품이 없습니다';card.appendChild(emp);
      }
    }
    grid.appendChild(card);
  });
}

function exportJSON(){
  const clean=JSON.parse(JSON.stringify(calData));
  Object.values(clean).forEach(evs=>evs.forEach(e=>delete e._lane));
  const out={calendar:clean,performance:perfData,hidden:perfHidden};
  const b=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='dashboard_data.json';a.click();URL.revokeObjectURL(a.href);
  toast('JSON 파일이 다운로드되었습니다');
}
function importJSON(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(d.calendar){calData=d.calendar;if(d.performance)perfData=d.performance;if(d.hidden)perfHidden=d.hidden}
      else if(typeof d==='object'){calData=d}
      else throw 0;
      migrateAll();
      const ks=Object.keys(calData).sort();
      if(ks.length){const[y,m]=ks[0].split('-');cY=+y;cM=+m}
      if(editing)toggleEdit();if(perfEditing)togglePerfEdit();
      renderCal();renderPerf();toast('JSON 데이터를 불러왔습니다');
    }catch{toast('⚠️ 올바른 JSON 형식이 아닙니다')}
  };
  r.readAsText(f);e.target.value='';
}
